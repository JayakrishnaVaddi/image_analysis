<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebSocket Stream Test</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f766e'/%3E%3Ccircle cx='32' cy='32' r='14' fill='%23f6f1e8'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css?v=20260401" />
  </head>
  <body>
    <main class="app-shell">
      <section class="card">
        <p class="eyebrow">Raspberry Pi Test Stream</p>
        <h1>WebSocket Video Validation</h1>
        <p class="description">
          This page is only for validating the main-project WebSocket stream server.
          It is not integrated into the original application UI or workflow.
        </p>

        <div class="controls">
          <label class="field">
            <span>WebSocket URL</span>
            <input id="wsUrl" type="text" value="" placeholder="ws://<raspberry-pi-ip>:8765/stream" />
          </label>
          <button id="startDeviceButton" type="button">Start Device</button>
          <button id="runTestButton" type="button">Run Test</button>
          <button id="stopDeviceButton" type="button">Stop Device</button>
        </div>

        <p id="status" class="status">Idle</p>
        <div class="session-meta">
          <p class="metric">
            <span class="metric-label">Session</span>
            <span id="sessionState">Idle</span>
          </p>
          <p class="metric">
            <span class="metric-label">Temperature</span>
            <span id="temperatureValue">--.- C</span>
          </p>
          <p class="metric">
            <span class="metric-label">Test</span>
            <span id="testState">Idle</span>
          </p>
        </div>

        <div class="stream-frame">
          <img id="streamImage" alt="Live Raspberry Pi camera stream" />
          <div id="placeholder" class="placeholder">No stream yet</div>
        </div>
      </section>
    </main>

    <script src="./app.js?v=20260401"></script>
  </body>
</html>

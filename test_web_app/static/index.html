<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Image Analysis Test Harness</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef1e7;
      --panel: #fbfcf7;
      --ink: #1f2b22;
      --muted: #637066;
      --accent: #1f6b4f;
      --accent-strong: #184f3b;
      --border: #d7ded1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(31, 107, 79, 0.10), transparent 30%),
        linear-gradient(180deg, #f6f8f1 0%, var(--bg) 100%);
      color: var(--ink);
    }

    .page {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 20px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-strong);
    }

    button:disabled {
      opacity: 0.65;
      cursor: default;
    }

    .stage {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 28px 0;
    }

    .panel {
      width: min(920px, 88vw);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 18px 48px rgba(31, 43, 34, 0.08);
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .metric {
      padding: 12px 14px;
      border-radius: 14px;
      background: #f2f6ee;
      border: 1px solid var(--border);
    }

    .metric-label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .metric-value {
      color: var(--ink);
      font-weight: 700;
    }

    .status {
      font-weight: 700;
      color: var(--ink);
      text-transform: lowercase;
    }

    .results {
      margin-top: 16px;
      padding: 16px;
      border-radius: 16px;
      background: #f2f6ee;
      border: 1px solid var(--border);
      color: var(--ink);
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .results[hidden] {
      display: none;
    }

    .video-shell {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 18px;
      overflow: hidden;
      background: #dde5da;
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #dfe7dd;
    }

    .placeholder {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="toolbar">
      <button id="check-button" type="button">Check Pi Connection</button>
      <button id="start-button">Start Test Session</button>
      <button id="abort-button" type="button">Abort Test Session</button>
    </div>

    <div class="stage">
      <section class="panel">
        <div class="meta">
          <div class="metric">
            <span class="metric-label">Status</span>
            <span id="status" class="metric-value status">idle</span>
          </div>
          <div class="metric">
            <span class="metric-label">Last Frame</span>
            <span id="last-frame" class="metric-value">Waiting for stream</span>
          </div>
          <div class="metric">
            <span class="metric-label">IR Temperature</span>
            <span id="temperature" class="metric-value">--</span>
          </div>
          <div class="metric">
            <span class="metric-label">Time Remaining</span>
            <span id="remaining" class="metric-value">--</span>
          </div>
          <div class="metric">
            <span class="metric-label">Session State</span>
            <span id="session-state" class="metric-value">idle</span>
          </div>
          <div class="metric">
            <span class="metric-label">Session ID</span>
            <span id="session-id" class="metric-value">--</span>
          </div>
          <div class="metric">
            <span class="metric-label">Stream Transport</span>
            <span id="stream-transport" class="metric-value">websocket</span>
          </div>
          <div class="metric">
            <span class="metric-label">WebSocket Status</span>
            <span id="websocket-status" class="metric-value">idle</span>
          </div>
        </div>
        <div class="video-shell">
          <img id="video-frame" alt="Annotated live stream" hidden>
          <div id="placeholder" class="placeholder">
            Start a test session to view the live annotated stream here.
          </div>
        </div>
        <pre id="results" class="results" hidden></pre>
      </section>
    </div>
  </div>

  <script>
    const checkButton = document.getElementById("check-button");
    const startButton = document.getElementById("start-button");
    const abortButton = document.getElementById("abort-button");
    const statusText = document.getElementById("status");
    const lastFrameText = document.getElementById("last-frame");
    const temperatureText = document.getElementById("temperature");
    const remainingText = document.getElementById("remaining");
    const sessionStateText = document.getElementById("session-state");
    const sessionIdText = document.getElementById("session-id");
    const streamTransportText = document.getElementById("stream-transport");
    const websocketStatusText = document.getElementById("websocket-status");
    const videoFrame = document.getElementById("video-frame");
    const placeholder = document.getElementById("placeholder");
    const resultsBox = document.getElementById("results");

    async function checkConnection() {
      checkButton.disabled = true;
      try {
        const response = await fetch("/api/check-connection", { method: "POST" });
        const payload = await response.json();
        renderStatus(payload);
      } catch (error) {
        statusText.textContent = "error";
        lastFrameText.textContent = error.message;
      } finally {
        checkButton.disabled = false;
      }
    }

    async function startSession() {
      startButton.disabled = true;
      try {
        const response = await fetch("/api/start-session", { method: "POST" });
        const payload = await response.json();
        if (!response.ok && response.status !== 202) {
          throw new Error(payload.message || "Unable to start test session");
        }
        renderStatus(payload);
      } catch (error) {
        statusText.textContent = "error";
        lastFrameText.textContent = error.message;
      } finally {
        await refreshStatus();
      }
    }

    async function abortSession() {
      abortButton.disabled = true;
      try {
        const response = await fetch("/api/abort-session", { method: "POST" });
        const payload = await response.json();
        if (!response.ok && response.status !== 202) {
          throw new Error(payload.message || "Unable to abort test session");
        }
        renderStatus(payload);
      } catch (error) {
        statusText.textContent = "error";
        lastFrameText.textContent = error.message;
      } finally {
        await refreshStatus();
      }
    }

    function renderStatus(payload) {
      const status = payload.status || "idle";
      statusText.textContent = status;
      startButton.disabled = payload.running === true;
      checkButton.disabled = payload.running === true;
      abortButton.disabled = payload.running !== true;
      sessionStateText.textContent = payload.sessionState || status;
      sessionIdText.textContent = payload.sessionId || "--";
      streamTransportText.textContent = payload.streamTransport || "websocket";
      websocketStatusText.textContent = payload.websocketStatus || "idle";
      temperatureText.textContent = formatTemperature(payload.latestIrTemperatureC);
      remainingText.textContent = formatRemaining(payload.remainingSeconds);

      if (payload.lastFrameAt) {
        lastFrameText.textContent = `Last frame: ${payload.lastFrameAt}`;
        videoFrame.hidden = false;
        placeholder.hidden = true;
        videoFrame.src = `/api/latest-frame.jpg?t=${Date.now()}`;
      } else if (status === "running") {
        lastFrameText.textContent = "Session running. Waiting for annotated frames...";
      } else if (status === "completed") {
        lastFrameText.textContent = "Session completed";
      } else if (status === "aborted" || status === "aborting") {
        lastFrameText.textContent = payload.lastError || "Session abort in progress";
      } else if (status === "error") {
        lastFrameText.textContent = payload.lastError || "Session failed";
      } else if (payload.connectionStatus === "connected") {
        lastFrameText.textContent = `Pi reachable. Last checked: ${payload.connectionCheckedAt || "just now"}`;
      } else {
        lastFrameText.textContent = "Waiting for stream";
      }

      if (payload.finalResult) {
        resultsBox.hidden = false;
        resultsBox.textContent = JSON.stringify(payload.finalResult, null, 2);
      } else if (Array.isArray(payload.finalResultBinary)) {
        resultsBox.hidden = false;
        resultsBox.textContent = JSON.stringify(
          {
            status: "success",
            transport: payload.streamTransport || "websocket",
            binaryData: payload.finalResultBinary,
          },
          null,
          2,
        );
      } else {
        resultsBox.hidden = true;
        resultsBox.textContent = "";
      }
    }

    function formatTemperature(value) {
      if (typeof value !== "number") {
        return "--";
      }
      return `${value.toFixed(1)} C`;
    }

    function formatRemaining(value) {
      if (typeof value !== "number") {
        return "--";
      }
      const totalSeconds = Math.max(0, Math.round(value));
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes}:${String(seconds).padStart(2, "0")}`;
    }

    async function refreshStatus() {
      try {
        const response = await fetch("/api/status", { cache: "no-store" });
        const payload = await response.json();
        renderStatus(payload);
      } catch (_error) {
        statusText.textContent = "error";
        lastFrameText.textContent = "Unable to reach test web app";
      }
    }

    checkButton.addEventListener("click", checkConnection);
    startButton.addEventListener("click", startSession);
    abortButton.addEventListener("click", abortSession);
    refreshStatus();
    window.setInterval(refreshStatus, 1000);
  </script>
</body>
</html>
